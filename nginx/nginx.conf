# events → blok konfigurasi untuk setting level worker Nginx
events {
    worker_connections 1024;
    # → satu worker process Nginx bisa handle maksimal 1024 koneksi bersamaan
    # → koneksi = client yang sedang terhubung, bukan request per detik
}

# http → blok utama konfigurasi untuk semua traffic HTTP
http {

    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    # → definisikan zone rate limiting bernama "api"
    # → $binary_remote_addr = tracking per IP client dalam format binary
    # → binary lebih hemat memori dibanding $remote_addr yang format string
    # → zone=api:10m = alokasi 10MB memori untuk menyimpan data tracking per IP
    # → 10MB cukup untuk track sekitar 160.000 IP sekaligus
    # → rate=10r/s = setiap IP hanya boleh kirim maksimal 10 request per detik
    # → zone ini belum aktif sampai dipanggil di dalam location dengan limit_req

    # server → blok konfigurasi untuk satu virtual server
    server {
        listen 80;
        # → Nginx mendengarkan koneksi masuk di port 80 (port HTTP standar)

        server_name localhost;
        # → virtual server ini merespons request dengan Host header "localhost"
        # → di production diganti dengan domain asli, misal: api.namadomain.com

        access_log /var/log/nginx/access.log;
        # → catat setiap request yang masuk ke file ini
        # → isi log: IP client, waktu, method, path, status code, ukuran response

        error_log /var/log/nginx/error.log;
        # → catat semua error Nginx ke file ini
        # → termasuk error rate limit, koneksi gagal ke Go app, dll

        # location / → aturan untuk semua request yang path-nya diawali /
        # → karena / mencakup semua path, ini berlaku untuk seluruh request
        location / {

            limit_req zone=api burst=20 nodelay;
            # → aktifkan rate limiting menggunakan zone "api" yang sudah didefinisikan di atas
            # → burst=20 = toleransi lonjakan, maksimal 20 request ekstra bisa diterima sekaligus
            # → nodelay = request dalam burst langsung diproses, tidak diqueue/ditunda
            # → tanpa nodelay: request diqueue dan diproses pelan sesuai rate → client nunggu lama
            # → dengan nodelay: request langsung diproses, yang melebihi burst langsung ditolak 429

            limit_req_status 429;
            # → kalau request melebihi rate + burst, Nginx return HTTP status 429
            # → 429 = Too Many Requests, artinya client kirim terlalu banyak request
            # → default Nginx tanpa ini adalah 503, tapi 429 lebih semantik untuk rate limit

            proxy_pass http://app:8080;
            # → teruskan request ke Go app container di port 8080
            # → "app" adalah nama service di docker-compose, bukan hostname atau IP
            # → Docker internal DNS resolve nama service "app" ke IP container Go app

            proxy_set_header Host $host;
            # → set header Host yang diteruskan ke Go app
            # → $host = nilai Host header dari request client asli
            # → tanpa ini Go app menerima Host berisi IP internal Nginx, bukan domain asli

            proxy_set_header X-Real-IP $remote_addr;
            # → set header X-Real-IP berisi IP asli client
            # → $remote_addr = IP dari siapa yang terhubung langsung ke Nginx
            # → tanpa ini Go app hanya lihat IP Nginx (container internal), bukan IP client
            # → Go app bisa baca IP asli client via header X-Real-IP di r.Header.Get("X-Real-IP")

            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # → set header X-Forwarded-For berisi chain semua IP yang dilalui request
            # → $proxy_add_x_forwarded_for = append IP client ke chain yang sudah ada
            # → berguna kalau ada multiple proxy di depan Nginx, chain-nya jadi: clientIP, proxy1IP, proxy2IP
            # → standar industri untuk tracking IP asli di balik proxy

            proxy_connect_timeout 10s;
            # → batas waktu maksimal untuk Nginx establish koneksi ke Go app container
            # → kalau Go app tidak merespons koneksi dalam 10 detik → Nginx return 502

            proxy_send_timeout 10s;
            # → batas waktu maksimal untuk Nginx kirim request ke Go app
            # → kalau pengiriman request tidak selesai dalam 10 detik → Nginx return 502

            proxy_read_timeout 10s;
            # → batas waktu maksimal untuk Nginx tunggu response dari Go app
            # → kalau Go app tidak kirim response dalam 10 detik → Nginx return 504
            # → ini yang paling sering perlu dinaikkan kalau ada endpoint yang lambat
        }
    }
}

# Cara kerja rate limiting (rate=10r/s, burst=20, nodelay):
#
# - User kirim 5 req/detik        → ✅ semua lolos, masih di bawah rate normal
# - User kirim 15 req sekaligus   → ✅ semua lolos, masih di bawah burst 20
# - User kirim 25 req sekaligus   → ✅ 20 lolos (burst), ❌ 5 sisanya dapat 429
# - User kirim 100 req sekaligus  → ✅ 20 lolos (burst), ❌ 80 sisanya dapat 429
#
# Perbedaan 502 vs 504:
# → 502 Bad Gateway     = Nginx tidak bisa connect atau kirim request ke Go app
# → 504 Gateway Timeout = Nginx bisa connect, tapi Go app tidak balas dalam waktu timeout